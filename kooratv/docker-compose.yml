
version: "3.9"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: kooratv
      POSTGRES_USER: koora
      POSTGRES_PASSWORD: koora_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports: ["5432:5432"]

  redis:
    image: redis:7
    ports: ["6379:6379"]

  api:
    build: ./api
    env_file: .env
    depends_on: [postgres, redis]
    ports: ["4000:4000"]
    volumes: ["./api:/app"]

  worker:
    build: ./worker
    env_file: .env
    depends_on: [api, redis, postgres]
    volumes: ["./worker:/app"]

  admin:
    build: ./admin
    env_file: .env
    depends_on: [api]
    ports: ["3001:3000"]
    volumes: ["./admin:/app"]

  web:
    build: ./web
    env_file: .env
    depends_on: [api]
    ports: ["3000:3000"]
    volumes: ["./web:/app"]

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    restart: unless-stopped
    volumes:
      - ./mediamtx.yml:/mediamtx.yml
    ports:
      - "8888:8888"
      - "1935:1935"
      - "8554:8554"

  nginx:
    image: nginx:1.27
    volumes:
      - ./reverse-proxy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./hls:/usr/share/nginx/html/hls:ro
    ports: ["80:80"]
    depends_on: [web, admin, api]

volumes:
  pgdata:
