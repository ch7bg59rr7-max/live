
events {}
http {
  sendfile off;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65s;
  server {
    listen 80;
    server_name _;

    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Headers "Range, Origin, Accept, Content-Type, Authorization" always;
    add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;

    location /api/   { proxy_pass http://api:4000/;  }
    location /admin/ { proxy_pass http://admin:3000/; }
    location /       { proxy_pass http://web:3000/;   }

    location /hls/ {
      root /usr/share/nginx/html;
      types { application/vnd.apple.mpegurl m3u8; video/mp2t ts; application/octet-stream mp4; }
      add_header Cache-Control "no-store";

      auth_request /_auth_hls;
      auth_request_set $auth_status $upstream_status;

      try_files $uri =404;
    }

    location = /_auth_hls {
      internal;
      proxy_pass http://api:4000/internal/auth/hls;
      proxy_set_header X-Original-URI $request_uri;
      proxy_set_header X-Original-Method $request_method;
      proxy_pass_request_body off;
      proxy_set_header Content-Length "";
    }
  }
}
